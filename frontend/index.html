
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Inventory Manager</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

header{
    background:#111827;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

header h1{
    color:#38bdf8;
}

.container{
    padding:30px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

.stat-card h2{
    color:#38bdf8;
    margin-bottom:10px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:bold;
}

.primary{
    background:#0ea5e9;
    color:white;
}

.edit{
    background:#f59e0b;
    color:white;
}

.danger{
    background:#ef4444;
    color:white;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
}

.card h3{
    color:#38bdf8;
    margin-bottom:10px;
}

.card p{
    margin:8px 0;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#1e293b;
    width:450px;
    padding:25px;
    border-radius:15px;
}

.modal-content h2{
    margin-bottom:15px;
}

.modal-content input{
    width:100%;
    margin-bottom:10px;
}

</style>

</head>

<body>

<header>
    <h1>Product Inventory Manager</h1>

    <button class="primary" onclick="openAddModal()">
        Add Product
    </button>
</header>

<div class="container">

    <div class="stats">

        <div class="stat-card">
            <h2 id="totalProducts">0</h2>
            <p>Total Products</p>
        </div>

        

        <div class="stat-card">
            <h2 id="inventoryValue">$0</h2>
            <p>Total Inventory Value</p>
        </div>

    </div>

    <div class="controls">

        <input
        type="number"
        id="searchId"
        placeholder="Search Product ID">

        <button
        class="primary"
        onclick="searchProduct()">
        Search
        </button>

        <button
        class="primary"
        onclick="loadProducts()">
        Refresh
        </button>

    </div>

    <div id="products" class="products"></div>

</div>

<!-- Add Modal -->

<div class="modal" id="addModal">

    <div class="modal-content">

        <h2>Add Product</h2>

        <input id="addId" placeholder="ID">
        <input id="addName" placeholder="Name">
        <input id="addDescription" placeholder="Description">
        <input id="addPrice" placeholder="Price">
        <input id="addQuantity" placeholder="Quantity">

        <button
        class="primary"
        onclick="addProduct()">
        Save Product
        </button>

    </div>

</div>

<!-- Edit Modal -->

<div class="modal" id="editModal">

    <div class="modal-content">

        <h2>Edit Product</h2>

        <input id="editId" disabled>
        <input id="editName">
        <input id="editDescription">
        <input id="editPrice">
        <input id="editQuantity">

        <button
        class="edit"
        onclick="updateProduct()">
        Update Product
        </button>

    </div>

</div>

<script>

const API = "http://127.0.0.1:8000";

let selectedProductId = null;

async function loadProducts(){

    const response =
    await fetch(`${API}/products`);

    const products =
    await response.json();

    renderProducts(products);

    updateStats(products);
}

function updateStats(products){

    document.getElementById("totalProducts")
    .innerText = products.length;

    
    let totalValue = 0;

    products.forEach(product=>{

        
        totalValue += product.price;
         

    });

    
    document.getElementById("inventoryValue")
    .innerText = "$" + totalValue.toFixed(2);
}

function renderProducts(products){

    let html = "";

    products.forEach(product=>{

        html += `

        <div class="card">

            <h3>${product.name}</h3>

            <p><b>Description:</b> ${product.description}</p>

            <p><b>Price:</b> $${product.price}</p>

            <p><b>Quantity:</b> ${product.quantity}</p>

            <div class="actions">

                <button
                class="edit"
                onclick='openEditModal(${JSON.stringify(product)})'>
                Edit
                </button>

                <button
                class="danger"
                onclick="deleteProduct(${product.id})">
                Delete
                </button>

            </div>

        </div>

        `;
    });

    document.getElementById("products")
    .innerHTML = html;
}

function openAddModal(){

    document.getElementById("addModal")
    .style.display = "flex";
}

function openEditModal(product){

    selectedProductId = product.id;

    document.getElementById("editId").value =
    product.id;

    document.getElementById("editName").value =
    product.name;

    document.getElementById("editDescription").value =
    product.description;

    document.getElementById("editPrice").value =
    product.price;

    document.getElementById("editQuantity").value =
    product.quantity;

    document.getElementById("editModal")
    .style.display = "flex";
}

async function addProduct(){

    const product = {

        id:Number(addId.value),
        name:addName.value,
        description:addDescription.value,
        price:Number(addPrice.value),
        quantity:Number(addQuantity.value)

    };

    await fetch(`${API}/product`,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(product)

    });

    location.reload();
}

async function updateProduct(){

    const product = {

        id:selectedProductId,
        name:editName.value,
        description:editDescription.value,
        price:Number(editPrice.value),
        quantity:Number(editQuantity.value)

    };

    await fetch(`${API}/product/${selectedProductId}`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(product)

    });

    location.reload();
}

async function deleteProduct(id){

    await fetch(`${API}/product?id=${id}`,{

        method:"DELETE"

    });

    loadProducts();
}

async function searchProduct(){

    const id =
    document.getElementById("searchId").value;

    if(!id){

        loadProducts();
        return;
    }

    const response =
    await fetch(`${API}/product/${id}`);

    const product =
    await response.json();

    renderProducts([product]);
}

window.onclick = function(event){

    if(event.target.classList.contains("modal")){

        event.target.style.display = "none";
    }
}

loadProducts();

</script>

</body>
</html>
